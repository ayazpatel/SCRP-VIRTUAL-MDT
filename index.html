<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual MDT — Dispatch Terminal</title>
    <style>
        :root {
            --bg-primary: #0d0f14;
            --bg-secondary: #141722;
            --bg-tertiary: #1e2232;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #1d4ed8;
            --border-color: #262b3d;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;

            /* Navigation Layout Dimensions */
            --sidebar-width: 280px;
            --header-mobile-height: 65px;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        }
        
        body { 
            background-color: var(--bg-primary); 
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            -webkit-font-smoothing: antialiased;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        /* Mobile Top Navigation Bar */
        header { 
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color); 
            padding: 0 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-mobile-height);
            z-index: 100;
        }
        header h1 { font-size: 16px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #fff; }

        /* Mobile Hamburger Icon Setup */
        .menu-toggle {
            background: transparent;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 5px;
            z-index: 110;
        }
        .menu-toggle span {
            display: block;
            width: 22px;
            height: 2px;
            background-color: currentColor;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        /* Sidebar Drawer Design */
        .sidebar {
            position: fixed;
            top: 0;
            left: calc(-1 * var(--sidebar-width));
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 105;
            transition: left 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar.open { left: 0; }
        .sidebar-header {
            padding: 24px 20px;
            display: none; 
        }
        .sidebar-header h1 {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #fff;
            padding-bottom: 10px;
        }
        
        .nav-menu {
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            flex: 1;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 14px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
            text-align: left;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }
        .tab-btn:hover { color: var(--text-main); background: var(--bg-tertiary); }
        .tab-btn.active { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border-left: 3px solid var(--accent); border-radius: 4px 8px 8px 4px; padding-left: 13px; }

        /* Dark Fog Backdrop Overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 102;
        }
        .sidebar-overlay.visible { display: block; }

        /* View Content Context Wrapper */
        main {
            flex: 1;
            padding: 20px;
            margin-top: var(--header-mobile-height);
            width: 100%;
        }
        
        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; }

        /* Charge Sheet Layout */
        .calculator-layout { display: flex; flex-direction: column; gap: 20px; }
        .robbery-grid { display: flex; flex-direction: column; gap: 14px; width: 100%; }
        
        .card { 
            background: var(--bg-secondary); 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            gap: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            transition: border-color 0.2s ease, transform 0.2s ease;
        }
        .card:hover {
            border-color: #3b82f670;
            transform: translateY(-2px);
        }
        .card h3 { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: 0.3px; }
        .card-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .card-actions { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 12px; }
        .btn-add { background: var(--accent); border: none; color: white; padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 12px; transition: background 0.15s ease; }
        .btn-add:hover { background: var(--accent-hover); }

        /* Summary Panel Layout */
        .basket-panel { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; height: fit-content; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); }
        .basket-title { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); font-weight: 700; color: var(--text-muted); }
        .basket-items { max-height: 260px; overflow-y: auto; margin-bottom: 20px; }
        .basket-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 10px 0; border-bottom: 1px solid #1e2232; gap: 10px; }
        .basket-item span { color: #cbd5e1; }
        .basket-item strong { color: #fff; white-space: nowrap; font-weight: 600; background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
        
        .totals { background: rgba(13, 15, 20, 0.5); padding: 16px; border-radius: 8px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 8px; }
        .total-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-muted); }
        .total-row span:last-child { color: var(--text-main); font-weight: 600; }
        .total-row.grand-total { margin-top: 4px; padding-top: 10px; border-top: 1px dashed var(--border-color); font-size: 14px; font-weight: bold; color: #fff; }
        .total-row.grand-total span:last-child { color: var(--success); font-size: 16px; }

        /* Penal Code Utilities Bar */
        .filter-bar { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; width: 100%; }
        .search-box { background: var(--bg-secondary); border: 1px solid var(--border-color); padding: 12px 16px; border-radius: 8px; color: white; width: 100%; font-size: 13px; transition: border-color 0.2s ease; }
        .search-box:focus { outline: none; border-color: var(--accent); }
        .filter-buttons-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; width: 100%; scrollbar-width: none; }
        .filter-buttons-scroll::-webkit-scrollbar { display: none; }
        .filter-btn { background: var(--bg-secondary); border: 1px solid var(--border-color); color: var(--text-muted); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; transition: all 0.15s ease; }
        .filter-btn:hover { color: #fff; background: var(--bg-tertiary); }
        .filter-btn.active { background: rgba(59, 130, 246, 0.1); border-color: var(--accent); color: #60a5fa; }

        /* Dynamic Table Grid Layout */
        .table-container { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; overflow-x: auto; width: 100%; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2); }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; min-width: 800px; }
        th { background: #161924; color: var(--text-muted); padding: 16px 20px; font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; border-bottom: 1px solid var(--border-color); }
        td { padding: 14px 20px; border-bottom: 1px solid var(--border-color); color: #cbd5e1; vertical-align: middle; line-height: 1.4; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #171b29; color: #fff; }
        
        /* Modernized Category Pills */
        .badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
        .badge-traffic { background: rgba(71, 85, 105, 0.2); color: #cbd5e1; border: 1px solid rgba(71, 85, 105, 0.3); }
        .badge-infraction { background: rgba(14, 165, 233, 0.15); color: #38bdf8; border: 1px solid rgba(14, 165, 233, 0.2); }
        .badge-misdemeanor { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.2); }
        .badge-felony { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .badge-hut { background: rgba(139, 92, 246, 0.15); color: #a78bfa; border: 1px solid rgba(139, 92, 246, 0.2); }
        .badge-internal-affairs { background: rgba(236, 72, 153, 0.15); color: #f472b6; border: 1px solid rgba(236, 72, 153, 0.2); }

        /* Animation States for Hamburger Menu Drawer */
        .menu-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .menu-toggle.open span:nth-child(2) { opacity: 0; }
        .menu-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        /* Responsive Configuration Adaptive Hooks Trigger */
        @media (min-width: 992px) {
            header { display: none; }
            .menu-toggle { display: none; }
            .sidebar-overlay { display: none !important; }

            .sidebar { left: 0 !important; width: var(--sidebar-width); }
            .sidebar-header { display: block; border-bottom: 1px solid var(--border-color); }

            main {
                margin-left: var(--sidebar-width);
                margin-top: 0;
                padding: 40px;
                width: calc(100% - var(--sidebar-width));
            }

            .calculator-layout { display: grid; grid-template-columns: 1fr 400px; gap: 24px; align-items: start; }
            .robbery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
            .basket-panel { position: sticky; top: 40px; }
            
            .filter-bar { flex-direction: row; align-items: center; gap: 16px; }
            .search-box { width: 300px; }
            .filter-buttons-scroll { overflow-x: visible; width: auto; }
        }
    </style>
</head>

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebarMenu');
            const overlay = document.getElementById('sidebarOverlay');
            const toggleBtn = document.getElementById('menuToggle');
            
            sidebar.classList.toggle('open');
            overlay.classList.toggle('visible');
            toggleBtn.classList.toggle('open');
        }

        function switchTab(tabId) {
            const sidebar = document.getElementById('sidebarMenu');
            if (sidebar.classList.contains('open')) {
                toggleSidebar();
            }

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');

            document.querySelectorAll(`.tab-btn[onclick="switchTab('${tabId}')"]`).forEach(btn => {
                btn.classList.add('active');
            });
        }

        function renderChargeSheetGrid() {
            const grid = document.getElementById('robberyGrid');
            grid.innerHTML = '';

            for (const key in chargeSheetGroups) {
                const group = chargeSheetGroups[key];
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div>
                        <h3>${group.label}</h3>
                        <div class="card-meta">System Max: $${group.capFine.toLocaleString()} / ${group.capTime} Mos</div>
                    </div>
                    <div class="card-actions">
                        <span style="font-size:11px; color:var(--text-muted); font-weight:600;">Linked Crimes: ${group.charges.length}</span>
                        <button class="btn-add" onclick="populateSummary('${key}')">Load Preset</button>
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        function populateSummary(groupKey) {
            const group = chargeSheetGroups[groupKey];
            const basketItems = document.getElementById('basketItems');
            basketItems.innerHTML = '';

            let accumulatedFine = 0;
            let accumulatedTime = 0;

            group.charges.forEach(charge => {
                accumulatedFine += charge.fine;
                accumulatedTime += charge.jailTime;

                const itemRow = document.createElement('div');
                itemRow.className = 'basket-item';
                itemRow.innerHTML = `
                    <span>${charge.label}</span>
                    <strong>$${charge.fine.toLocaleString()} / ${charge.jailTime} Mo</strong>
                `;
                basketItems.appendChild(itemRow);
            });

            document.getElementById('summaryFine').innerText = `$${accumulatedFine.toLocaleString()}`;
            document.getElementById('summaryTime').innerText = `${accumulatedTime} Months`;
            document.getElementById('summaryCap').innerText = `$${group.capFine.toLocaleString()} / ${group.capTime} Months`;
        }

            tbody.innerHTML = '';

            for (const key in penalCodes) {
                const item = penalCodes[key];
                const tr = document.createElement('tr');
                tr.setAttribute('data-category', item.category);
                tr.setAttribute('data-name', item.label.toLowerCase());
                tr.setAttribute('data-desc', item.description.toLowerCase());

                let badgeClass = `badge-${item.category.replace('_', '-')}`;
                let readableCategory = item.category.replace('_', ' ');

                let fineDisplay = item.fine === 999999 ? "Judicial Discretion" : `$${item.fine.toLocaleString()}`;
                let jailDisplay = item.jailTime === 999999 || item.jailTime === 9999999 || item.jailTime === 99999999 ? "H.U.T" : `${item.jailTime} Months`;

                tr.innerHTML = `
                    <td style="font-weight:600; color:#fff">${item.label}</td>
                    <td><span class="badge ${badgeClass}">${readableCategory}</span></td>
                    <td>${item.description}</td>
                    <td style="font-weight:600; color:${item.fine === 999999 ? 'var(--text-muted)' : '#fff'}">${fineDisplay}</td>
                    <td style="font-weight:600; color:#fff">${jailDisplay}</td>
                `;
                tbody.appendChild(tr);
            }
        }

        function filterCategory(category, element) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            currentCategoryFilter = category;
            filterTable();
        }

        function filterTable() {
            const query = document.getElementById('searchBox').value.toLowerCase();
            const rows = document.querySelectorAll('#penalCodesTableBody tr');

            rows.forEach(row => {
                const categoryMatch = (currentCategoryFilter === 'all' || row.getAttribute('data-category') === currentCategoryFilter);
                const nameMatch = row.getAttribute('data-name').includes(query);
                const descMatch = row.getAttribute('data-desc').includes(query);

                if (categoryMatch && (nameMatch || descMatch)) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
